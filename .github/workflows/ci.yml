name: CI - ATHLIXIR Gatekeeper

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  check-code:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./athlixir_production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './athlixir_production/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Restore Next.js Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/athlixir_production/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Run Linter (Mandatory)
        run: npm run lint

      - name: TypeScript Type Check (Strict)
        run: npm run type-check

      - name: Security Audit (Review Only)
        run: npm audit --audit-level=high || true

      - name: Run Mandatory Tests
        run: npm test

      - name: Build Application (Production Mode)
        run: npm run build
